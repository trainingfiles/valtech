<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            width: 300px;
            height: 300px;
            background-color: silver;
            overflow: auto;
        }
        .box{
            width: 200px;
            height: 200px;
            background-color: rgb(76, 75, 75);
            color: antiquewhite;
            text-align: center;
            line-height: 200px;
            border: 20px solid red;
            padding: 20px;
        }
        .box:nth-child(1){
            margin: 140px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box">Box 1</div>
    </div>
</body>
</html>
