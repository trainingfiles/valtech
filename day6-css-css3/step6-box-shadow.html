<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            width: 200px;
            height: 200px;
            background-color: white;
            margin: 100px auto;
        }
        .box{
            box-shadow: 0px 0px 40px black inset, 
                        10px 10px 10px red,
                        -10px 10px 10px rgb(0, 255, 115),
                        -10px -10px 10px rgb(30, 0, 255),
                        10px -10px 10px rgb(208, 235, 9);
        }
        div[title = "valtech"]{
            font-size: 100px;
            text-align: center;
            font-family: Arial, Helvetica, sans-serif;
            font-weight: bold;
            text-shadow: 10px 10px 10px rgb(85, 85, 85);
        }
    </style>
</head>
<body>
    <div class="box"></div>
    <div title="valtech">
        valtech_
    </div>
</body>
</html>
