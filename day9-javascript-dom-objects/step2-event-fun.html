<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            width: 800px;
            height: 400px;
            overflow: auto;
            background-color: rgb(135, 240, 240);
            display: flex;
            flex-wrap: wrap;
        }
        .container .box{
            height: 100px;
            flex-basis: 100px;
            background-color: springgreen;
            margin: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            font-family: sans-serif;
        }
        .container .box:hover{
            background-color: rgb(51, 77, 64);
            cursor: pointer;
            box-shadow: 5px 5px 5px black;
            color: rgb(236, 255, 236);
        }
    </style>
    <script>
        var count = 1;
        var si = null;
       /*  
       function selectedBoxRemoveHandler(){
            console.log(this);  
            document.getElementsByClassName("container")[0].removeChild(this);          
        } 
        */
        function removeSelectedBox(event){
            if(event.target.getAttribute("class") === "box"){
                document.getElementsByClassName("container")[0].removeChild(event.target);          
            }else{
                alert("container cant be removed from itself");
            }
        } 
        function createBox(){
            var elm = document.createElement("div");
            elm.textContent = count;
            elm.setAttribute("class", "box"); 
            // elm.addEventListener("click", selectedBoxRemoveHandler)
            document.getElementsByClassName("container")[0].appendChild(elm);
            /*   
             document.getElementsByClassName("container")[0].innerHTML+="<div class='box'>"+count+"</div>";
            */
            count++;
        }
        
/*         function logHandler(){
            console.log("add box was clicked")
        } */
/*         function removeFirstHandler(){
            var elm = document.getElementsByClassName("container")[0].firstChild;
            if(elm){
                document.getElementsByClassName("container")[0].removeChild(elm);
            }else{
                alert("nothing to remove")
            }
        }
        function removeLastHandler(){
            var elm = document.getElementsByClassName("container")[0].lastChild;
            if(elm){
                document.getElementsByClassName("container")[0].removeChild(elm);
            }else{
                alert("nothing to remove")
            }
        } */
        function init(){
           //  document.getElementsByTagName("button")[0].addEventListener("click", createBox);
            /* document.getElementsByTagName("button")[0].addEventListener("click", logHandler); */
            
/*             document.getElementsByTagName("button")[0].addEventListener("click", removeFirstHandler);
            document.getElementsByTagName("button")[1].addEventListener("click", removeLastHandler); */
            si = setInterval(function(){
                createBox();
                if(count > 10){
                    clearInterval(si);
                }
            },10);
            document.getElementsByClassName("container")[0].addEventListener("click",removeSelectedBox)
        }
        document.addEventListener("DOMContentLoaded", init);
    </script>
</head>
<body>
    <!-- <button>Add Box</button> -->
    <!-- <button>Stop Adding Box</button> -->
<!--     <button>Remove First Box</button>
    <button>Remove Last Box</button> -->
    <div class="container"></div>
</body>
</html>
