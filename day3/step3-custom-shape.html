<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        canvas{
            border: 2px solid red;
        }
    </style>
</head>
<body>
    <canvas width="700" height="500" id="can"></canvas>
    <script>
        var ctx = document.getElementById("can").getContext("2d");
            /* 
            ctx.moveTo(0,0);
            ctx.lineTo(50,50);
            ctx.moveTo(100,100);
            ctx.lineTo(150,150);
            ctx.moveTo(200,200);
            ctx.lineTo(250,250);
            ctx.moveTo(300,300);
            ctx.lineTo(350,350);
            ctx.moveTo(400,400);
            ctx.lineTo(450,450); 
            */
            ctx.lineWidth = 10;      
            ctx.beginPath();
            ctx.moveTo(150,100);
            ctx.lineTo(100,200);
            ctx.lineTo(200,200);
            // ctx.lineTo(150,100);
            ctx.fillStyle = "orange";
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(450,100);
            ctx.lineTo(400,200);
            ctx.lineTo(500,200);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

    </script>
</body>
</html>
