<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        canvas{
            border: 2px solid red;
            display: block;
            margin: 100px auto;
        }
    </style>
</head>
<body>
    <canvas width="500" height="500" id="can"></canvas>
    <script>
        var can = document.getElementById("can");
        var ctx = can.getContext("2d");
        ctx.fillStyle = "yellow";
        ctx.beginPath();
        ctx.arc(250,250,100,0,(Math.PI / 180) * 360,true);
        ctx.fillStyle = "red";
        ctx.fill();
        ctx.closePath();
        
        ctx.beginPath();
        ctx.arc(260,260,100,0,(Math.PI / 180) * 360,true);
        ctx.stroke();
        ctx.closePath();
    </script>
</body>
</html>
