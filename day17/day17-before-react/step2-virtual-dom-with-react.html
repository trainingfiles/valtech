<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <style>
        h1:lang(fr){
            background-color: crimson;
            color: papayawhip;
            text-align: center;
        }
    </style>
    <script>
        
        // REACT ELEMENT
        let comp1 = function(message){
            return React.createElement("h1",{lang : "fr"},message);
        };

        document.addEventListener("DOMContentLoaded",function(){
            ReactDOM.createRoot(document.getElementById("root2")).render([comp1(" welcome "),comp1(" to "),comp1(" your "), comp1(" world ")]);
        })
    </script>
</head>
<body>
    <div id="root1">1</div>
    <div id="root2">2</div>
    <div id="root3">3</div>
    <div id="root4">4</div>
</body>
</html>
