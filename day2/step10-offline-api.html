<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .online{
            color: darkseagreen;
        }
        .offline{
            color: crimson;
        }
    </style>
    <script>
       //  console.log(navigator.onLine);
       window.onload = function(){
        var log = document.getElementById("log");
        log.innerText = navigator.onLine ? "Online" : "Offline";
        if(navigator.onLine){
            log.setAttribute("class","online")
        }else{
            log.setAttribute("class","offline")
        }
       }
    </script>
</head>
<body>
    <h1>you are <span id="log"></span></h1>
</body>
</html>
