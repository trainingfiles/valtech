<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        // Higher Order Function;
        let promise = new Promise(function(resolve, reject){
            setTimeout(function(){
                var favNums = [97,36,62,77,32,15,45,25,20,89,51,7];
                if(true){
                    resolve("Resolve Data From Promise")
                }else{
                    reject("reject error from promise")
                }
            },2000);
        });

        promise.then(function(res){
            console.log("Result ", res);
            document.getElementById("log1").innerText = res;
            // return res.filter(val => val > 50 );
            return res.toUpperCase();
        })
        .then(function(res){
            console.log("Result ", res);
            document.getElementById("log2").innerText = res;
            // return res.reduce((initval, val) => initval + val, 0)
            return res.toLowerCase();
        })
        .then(function(res){
            console.log("Result ", res);
            document.getElementById("log3").innerText = res;
        })
        .catch(function(err){
            console.log("Error ", err);
        })
        .finally(function(){
            console.log("Promise is now complete ");
        });

    </script>
</head>
<body>
    <h1 id="log1"></h1>
    <h1 id="log2"></h1>
    <h1 id="log3"></h1>
</body>
</html>
