    <script>
        var firstpromise = function(){
            return new Promise(function(resolve, reject){
                setTimeout(function(){
                    if(true){
                        resolve("response from the first promise");
                    }else{
                        reject("error from the first promise");
                    }
                },100)
            })
        };
        var secondpromise = function(){
            return new Promise(function(resolve, reject){
                setTimeout(function(){
                    if(false){
                        resolve("response from the second promise");
                    }else{
                        reject("error from the second promise");
                    }
                },500)
            })
        };
        var thirdpromise = function(){
            return new Promise(function(resolve, reject){
                setTimeout(function(){
                    if(true){
                        resolve("response from the third promise");
                    }else{
                        reject("error from the third promise");
                    }
                },3000)
            })
        };

/* 
all promises to resolve 
any promises to resolve 
race resolve or reject which ever happens first
all settled
